# v2 hill-climb: tighter placement instructions + named-object hint.
# Goal: 10% baseline -> ~20%.

env:
  _target_: capx.envs.tasks.franka.franka_libero_env.FrankaLiberoCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level:
      _target_: capx.envs.simulators.vab.FrankaVabEnv
      task_yaml_path: /k8s-nfs/personal/haoru/gap-x/Variational-Automation-Benchmark/tasks/libero_object_all_variance/pick_up_the_alphabet_soup_and_place_it_in_the_basket.yaml
      privileged: false
      camera_w: 800
      camera_h: 512
    privileged: false
    apis:
      - FrankaLiberoApi
    prompt: |
      You are controlling a Franka Emika robot with API described below.
      Goal: {libero_environment_goal}

      The scene contains exactly these objects (use these names verbatim with sample_grasp_pose / get_object_pose):
        alphabet_soup, basket, salad_dressing, cream_cheese, milk, tomato_sauce, butter
      Do NOT use synonyms (no "soup_can", no "woven_basket", no "alphabet soup can"). Pass `use_multiview=True` (it is the default).

      Placement guidance for the basket (success predicate is contained_in(obj, basket) with xy_tol=0.10 m and z range [-0.05, 0.25] m above basket center):
        - Hover with the EE 3-5 cm above the basket center BEFORE releasing, not 25-30 cm. Drop pose: basket_pos + [0, 0, 0.05], top-down quaternion [0, 0, 1, 0].
        - After open_gripper, retreat straight up by 0.15 m so the gripper does not knock the basket.
        - If basket_pos is None, retry get_object_pose(\"basket\") once with use_multiview=True; do NOT try synonyms.

      You may write python comments for reasoning but ONLY write executable Python code (no fences). Imports must be explicit (e.g. `import numpy as np`).

    multi_turn_prompt: |
      The following code blocks were just executed:
      ```python
      {executed_code}
      ```
      The current console stdout is:
      ```
      {console_stdout}
      ```
      The current console stderr is:
      ```
      {console_stderr}
      ```
      Decision rules:
        - Reply with EXACTLY ONE of: 'REGENERATE\n```python\n...code...\n```' OR 'FINISH'.
        - Only reply 'FINISH' when the visual feedback clearly shows alphabet_soup resting INSIDE the basket. If it is on the floor next to the basket, the gripper is still holding it, or you are unsure, reply 'REGENERATE' and try again (e.g. re-grasp from a better angle, or move directly above basket center before releasing).
        - If a previous attempt placed the soup outside the basket, the next code block should: re-grasp the soup, lift, hover at basket_pos + [0, 0, 0.05] with top-down quat [0,0,1,0], then open_gripper.

api_servers:
  - _target_: capx.serving.launch_pyroki_server.main
    port: 8116
    host: 127.0.0.1
    robot: panda_description
    target_link: panda_hand

  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1

  - _target_: capx.serving.launch_sam3_server.main
    device: cuda
    port: 8114
    host: 127.0.0.1

record_video: true
use_img_differencing: true
output_dir: ./outputs/vab_object_all_variance_v2

trials: 10
num_workers: 6
