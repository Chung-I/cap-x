# v3 hill-climb: object-name hint + 16-turn budget (env CAPX_MULTITURN_LIMIT=16).
# Minimal prompt change vs baseline; lean on more turns to recover from bad drops.

env:
  _target_: capx.envs.tasks.franka.franka_libero_env.FrankaLiberoCodeEnv
  cfg:
    _target_: capx.envs.tasks.base.CodeExecEnvConfig
    low_level:
      _target_: capx.envs.simulators.vab.FrankaVabEnv
      task_yaml_path: /k8s-nfs/personal/haoru/gap-x/Variational-Automation-Benchmark/tasks/libero_object_all_variance/pick_up_the_alphabet_soup_and_place_it_in_the_basket.yaml
      privileged: false
      camera_w: 800
      camera_h: 512
    privileged: false
    apis:
      - FrankaLiberoApi
    prompt: |
      You are controlling a Franka Emika robot with API described below.
      Goal: {libero_environment_goal}

      Object names (use exactly these strings with sample_grasp_pose / get_object_pose; do NOT use synonyms):
        alphabet_soup, basket, salad_dressing, cream_cheese, milk, tomato_sauce, butter

      You may write python code comments for reasoning but ONLY write the executable Python code and do not write it in code fences.
      After this code executes, you will be able to get a new observation of the environment and write new code to complete the task if needed.
      The functions (APIs) below are already imported to the environment. If you want to use numpy, you need to import it explicitly.

    multi_turn_prompt: |
      The following code blocks were just executed:
      ```python
      {executed_code}
      ```
      The current console stdout is:
      ```
      {console_stdout}
      ```
      The current console stderr is:
      ```
      {console_stderr}
      ```
      If there were no errors during compilation or execution, the console stderr will be empty. If there were errors, consider regenerating the code.

      Verification before FINISH: success requires the alphabet_soup body XY to be within 0.10 m of basket XY and Z within [-0.05, 0.20] m of basket Z. Do NOT FINISH unless the visual feedback clearly shows the alphabet_soup INSIDE the basket. If unsure, REGENERATE and either (a) re-grasp and re-place, or (b) verify with `pos, _ = get_object_pose("alphabet_soup"); bp, _ = get_object_pose("basket"); print(np.linalg.norm(pos[:2]-bp[:2]), pos[2]-bp[2])`.

      Please respond with EXACTLY ONE of the following:
      - The word 'REGENERATE' followed immediately by new Python code in a fenced code block (```python...```) if you want to modify the code.
      - The word 'FINISH' if the task appears to be complete

api_servers:
  - _target_: capx.serving.launch_pyroki_server.main
    port: 8116
    host: 127.0.0.1
    robot: panda_description
    target_link: panda_hand

  - _target_: capx.serving.launch_contact_graspnet_server.main
    port: 8115
    host: 127.0.0.1

  - _target_: capx.serving.launch_sam3_server.main
    device: cuda
    port: 8114
    host: 127.0.0.1

record_video: true
use_img_differencing: true
output_dir: ./outputs/vab_object_all_variance_v3

trials: 10
num_workers: 6
